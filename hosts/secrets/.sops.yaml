# System-level sops config.
#
# System sops reuses the user's age identity (~/.config/sops/age/keys.txt)
# rather than a separate machine identity. sops-nix activation runs as
# root, which can read 0600 user-owned files, so the same key that the
# user uses for editing also decrypts at activation time.
#
# Recipients here should mirror home/deepak/.sops.yaml -- the user already
# maintains a per-machine age key there. Add a host's alias here when
# onboarding it into withFlakehub, then `sops updatekeys`.
keys:
  - &nixosEggYoke age1tk3vdafrm93dyqpnjymns92z9gmcrnr23cd6fh7ten8092j4tfas84wyhe
  - &nixosWSL     age1dtgm8nwnkwpn7s0xvnzzuvk6rfhm5f5rzuw7nnwxu45p5ns56eusrfwe20
creation_rules:
  - path_regex: system\.yaml$
    key_groups:
      - age:
          - *nixosEggYoke
          - *nixosWSL
