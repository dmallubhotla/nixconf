name: ci
on:
  push:
    branches: ['**']
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/flakehub-cache-action@main
      - name: Flake check
        run: nix flake check --print-build-logs
      - name: Build nixosWalrus (WSL)
        run: nix build --no-link --print-build-logs .#nixosConfigurations.nixosWalrus.config.system.build.toplevel
      - name: Build nixosEggYoke (WSL)
        run: nix build --no-link --print-build-logs .#nixosConfigurations.nixosEggYoke.config.system.build.toplevel
      - name: Build shannon (Proxmox)
        run: nix build --no-link --print-build-logs .#nixosConfigurations.shannon.config.system.build.toplevel
      - name: Build nixosVM
        run: nix build --no-link --print-build-logs .#nixosConfigurations.nixosVM.config.system.build.toplevel
